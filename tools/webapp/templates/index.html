<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>World Herb Library - Review</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>
  <header>
    <h1>World Herb Library</h1>
    <span id="counts" class="counts"></span>
  </header>

  <main>
    <aside id="sidebar">
      <input id="filter" type="search" placeholder="Filter books..." />
      <ul id="book-list"></ul>
    </aside>

    <section id="left-panel">
      <div id="image-area">
        <div id="image-wrap">
          <img id="book-image" alt="book image" />
          <p id="no-image" class="muted" hidden>No images for this book.</p>
        </div>
        <div id="image-controls">
          <button id="prev-img" type="button">&#8592; Prev</button>
          <span id="image-pos" class="muted"></span>
          <button id="next-img" type="button">Next &#8594;</button>
          <button id="set-title-page" type="button">Set as title page</button>
        </div>
        <p id="title-page-note" class="muted"></p>
      </div>

      <div id="transcript-area">
        <h2>Transcript region</h2>
        <p id="time-region" class="muted"></p>
        <pre id="transcript"></pre>
      </div>
    </section>

    <section id="right-panel">
      <h2>Metadata</h2>
      <form id="meta-form" autocomplete="off">
        <div class="field"><label for="title">Title</label><input id="title" name="title" /></div>
        <div class="field"><label for="subtitle">Subtitle</label><input id="subtitle" name="subtitle" /></div>
        <div class="field"><label for="author">Author</label><input id="author" name="author" /></div>
        <div class="field"><label for="publisher">Publisher</label><input id="publisher" name="publisher" /></div>
        <div class="field"><label for="published_date">Published date</label><input id="published_date" name="published_date" /></div>
        <div class="field"><label for="language">Language</label><input id="language" name="language" /></div>
        <div class="field"><label for="edition">Edition</label><input id="edition" name="edition" /></div>
        <div class="field"><label for="page_count">Page count</label><input id="page_count" name="page_count" /></div>
        <div class="field"><label for="notes">Notes</label><textarea id="notes" name="notes" rows="4"></textarea></div>
        <div class="actions">
          <button id="submit" type="submit">Submit</button>
          <span id="status" class="status"></span>
        </div>
      </form>
    </section>
  </main>

  <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
