name: release

# Build both apps and put them on the website's Downloads page.
#
# Push a tag like v0.8.0-alpha.1 and this builds the Android APK and the Windows
# installer, attaches them to a GitHub Release named after the tag, and
# registers each in the Supabase `releases` table — which is the Downloads
# page's data source, so the site shows the new builds immediately, no
# redeploy. Each app keeps its own version (gradle versionName, package.json),
# and the tag must match the desktop version so the updater can order releases.
#
# workflow_dispatch runs the two builds as a dry run: artifacts to inspect,
# nothing published.
#
# One-time repository setup, all under Settings > Secrets and variables:
#   vars.SUPABASE_URL                  (already set for the pages workflow)
#   secrets.SUPABASE_SERVICE_ROLE_KEY  RLS leaves anon read-only on `releases`,
#                                      so registering rows needs this. Without
#                                      it the GitHub Release still happens and
#                                      the register step says what is missing.
#   secrets.ANDROID_KEYSTORE_B64       required to publish Android on a tag:
#   secrets.ANDROID_KEYSTORE_PASSWORD  base64 of the signing keystore, its
#   secrets.ANDROID_KEY_ALIAS          password, and the key alias. A tagged
#                                      release without them FAILS the android job
#                                      (Android refuses to update an install
#                                      whose signing key changed, so a debug-
#                                      signed APK is unpublishable) — the desktop
#                                      release is independent and still ships. A
#                                      workflow_dispatch dry run may omit them and
#                                      gets a clearly-labelled debug-signed APK.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write # create the release and upload its assets

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  preflight:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # The tag drives the GitHub Release and updater channel, while the
      # installer filename/version comes from package.json. Refuse the entire
      # release when they disagree: a partial release would otherwise hide the
      # failure while installed desktop clients never see a newer version.
      - name: Verify tag matches the desktop version
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          version="$(node -p 'require("./desktop/package.json").version')"
          if [ "v$version" != "$GITHUB_REF_NAME" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match desktop/package.json v$version"
            exit 1
          fi

  android:
    needs: preflight
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
      signer: ${{ steps.signer.outputs.signer }}
      signer_sha256: ${{ steps.signer.outputs.sha256 }}
    defaults:
      run:
        working-directory: android/BookCapture
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Signing key (persistent release key required for tagged builds)
        env:
          KS_B64: ${{ secrets.ANDROID_KEYSTORE_B64 }}
          KS_PASS: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KS_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          IS_RELEASE: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') }}
        run: |
          if [ -n "$KS_B64" ]; then
            # strip any CR/LF/space first: a secret uploaded from a Windows
            # CRLF .b64 carries a \r that GNU `base64 -d` rejects (invalid input)
            echo "$KS_B64" | tr -d '\r\n ' | base64 -d > "$RUNNER_TEMP/keystore.jks"
            # the password/alias secrets were uploaded the same Windows way, so
            # strip any stray CR too — a trailing \r reads as a wrong password.
            {
              echo "WHL_KEYSTORE_FILE=$RUNNER_TEMP/keystore.jks"
              echo "WHL_KEYSTORE_PASSWORD=$(printf '%s' "$KS_PASS" | tr -d '\r\n')"
              echo "WHL_KEY_ALIAS=$(printf '%s' "${KS_ALIAS:-bookcapture}" | tr -d '\r\n')"
            } >> "$GITHUB_ENV"
          elif [ "$IS_RELEASE" = "true" ]; then
            # A tagged build is published and must stay updatable. The debug key
            # is ephemeral and Android rejects updates whose signer changed, so
            # refuse to build a debug-signed release here — before it can be
            # uploaded. Failing this job drops only Android; the desktop release
            # is independent and still ships (see the publish job's guard).
            echo "::error::Tagged Android release requires the persistent signing keystore, but ANDROID_KEYSTORE_B64 is not set. Refusing to build a debug-signed APK that cannot update installs. Add the ANDROID_KEYSTORE_* secrets (docs/releasing.md) and re-run."
            exit 1
          else
            # workflow_dispatch dry run: a debug-signed APK is fine to inspect,
            # but must be clearly labelled as non-publishable (see the naming
            # step, which appends a DONOTPUBLISH suffix when this is set).
            echo "WHL_DEBUG_SIGNED=true" >> "$GITHUB_ENV"
            echo "::warning::No ANDROID_KEYSTORE_B64 secret: this dry-run APK is signed with the runner's debug key. It is NOT publishable and cannot update installs signed with a different key."
          fi

      # The anon key is public by design (the website ships it to every
      # visitor); baking it in spares first-run typing — sign-in is what
      # authorizes anything. Blank falls back to the in-app Settings project.
      - name: Build
        env:
          WHL_SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          WHL_SUPABASE_ANON_KEY: ${{ vars.SUPABASE_ANON_KEY }}
        run: |
          chmod +x gradlew
          ./gradlew --no-daemon assembleRelease

      - name: Name the APK after its versionName
        id: ver
        run: |
          V=$(sed -n 's/.*versionName = "\([^"]*\)".*/\1/p' app/build.gradle.kts | head -1)
          test -n "$V" || { echo "::error::no versionName in app/build.gradle.kts"; exit 1; }
          # A dry-run debug build is suffixed so the artifact can never be
          # mistaken for a publishable release. Tagged builds keep the clean name.
          if [ "${WHL_DEBUG_SIGNED:-}" = "true" ]; then
            NAME="BookCapture-$V-debug-DONOTPUBLISH.apk"
          else
            NAME="BookCapture-$V.apk"
          fi
          mv app/build/outputs/apk/release/app-release.apk "$NAME"
          echo "version=$V" >> "$GITHUB_OUTPUT"

      # Report the signer, and — behind the keystore gate above — refuse any
      # release-signed APK whose certificate differs from the one already used
      # in production. Explicitly debug-signed dispatch artifacts remain valid
      # dry runs, but are labelled DONOTPUBLISH by the naming step above.
      # apksigner ships with the Android build-tools the runner already used to
      # build; the debug key's distinctive DN is "CN=Android Debug, O=Android".
      - name: Verify the APK signer
        id: signer
        shell: bash
        run: |
          APK=$(ls BookCapture-*.apk | head -1)
          APKSIGNER=$(ls "${ANDROID_SDK_ROOT:-$ANDROID_HOME}"/build-tools/*/apksigner 2>/dev/null | sort -V | tail -1 || true)
          [ -n "$APKSIGNER" ] || APKSIGNER=$(command -v apksigner || true)
          if [ -z "$APKSIGNER" ]; then
            echo "::error::apksigner not found on the runner; cannot verify the APK signer before publishing."
            exit 1
          fi
          # Capture first and print second: never let `tee` or another pipeline
          # command mask apksigner's exit status.
          if ! "$APKSIGNER" verify --print-certs "$APK" > signer.txt; then
            cat signer.txt
            echo "::error::apksigner rejected $APK; refusing to upload it."
            exit 1
          fi
          cat signer.txt
          # Match any signer block, not just "Signer #1": newer build-tools'
          # apksigner labels the fields "V2 Signer: certificate DN:" etc., so the
          # old anchored pattern found nothing and rejected a correctly-signed APK.
          DN=$(sed -n 's/.*certificate DN: //p' signer.txt | head -1)
          SHA256=$(sed -n 's/.*certificate SHA-256 digest: //p' signer.txt | head -1)
          if [ -z "$DN" ] || [ -z "$SHA256" ]; then
            echo "::error::apksigner did not report a signer DN and SHA-256 certificate digest; refusing to upload an unverifiable APK."
            exit 1
          fi
          ACTUAL_SHA256=$(printf '%s' "$SHA256" | tr -d '[:space:]' | tr '[:upper:]' '[:lower:]')
          IS_DEBUG=false
          if printf '%s' "$DN" | grep -qi "Android Debug"; then
            IS_DEBUG=true
          fi
          if [ "${WHL_DEBUG_SIGNED:-}" = "true" ]; then
            if [ "$IS_DEBUG" != "true" ]; then
              echo "::error::The dry run was marked debug-signed, but apksigner reported a non-debug certificate. Refusing an ambiguously labelled artifact."
              exit 1
            fi
            echo "::warning::Verified the explicitly debug-signed DONOTPUBLISH dry-run APK."
          else
            if [ "$IS_DEBUG" = "true" ]; then
              echo "::error::APK is signed with the debug key outside the explicitly labelled dry-run path; refusing to upload it."
              exit 1
            fi
            EXPECTED_FILE="release-signing-cert.sha256"
            if [ ! -f "$EXPECTED_FILE" ]; then
              echo "::error::$EXPECTED_FILE is missing; refusing to publish without the pinned Android signing identity."
              exit 1
            fi
            EXPECTED_SHA256=$(tr -d '[:space:]' < "$EXPECTED_FILE" | tr '[:upper:]' '[:lower:]')
            if ! printf '%s' "$EXPECTED_SHA256" | grep -Eq '^[0-9a-f]{64}$'; then
              echo "::error::$EXPECTED_FILE must contain exactly one SHA-256 certificate fingerprint."
              exit 1
            fi
            if [ "$ACTUAL_SHA256" != "$EXPECTED_SHA256" ]; then
              echo "::error::Android signing certificate mismatch: expected $EXPECTED_SHA256, got $ACTUAL_SHA256. Refusing an APK that cannot update existing installs."
              exit 1
            fi
          fi
          echo "signer=$DN" >> "$GITHUB_OUTPUT"
          echo "sha256=$ACTUAL_SHA256" >> "$GITHUB_OUTPUT"
          echo "- Android APK \`$APK\` signer: \`$DN\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Android APK certificate SHA-256: \`$ACTUAL_SHA256\`" >> "$GITHUB_STEP_SUMMARY"

      - name: Keep the APK
        uses: actions/upload-artifact@v4
        with:
          name: android
          path: android/BookCapture/BookCapture-*.apk
          if-no-files-found: error

  desktop:
    needs: preflight
    runs-on: windows-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
    defaults:
      run:
        working-directory: desktop
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Python (for the PyInstaller sidecar)
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Sidecar dependencies
        run: python -m pip install -r ../tools/requirements.txt pyinstaller

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Shell dependencies
        run: npm ci

      # The two halves of `npm run dist`, spelled out: that script calls
      # `python3` (the build machine's bare `python` is an unrelated toolchain),
      # while the runner only guarantees `python`.
      - name: Freeze the sidecar
        run: python -m PyInstaller --clean --noconfirm --distpath dist-sidecar --workpath build-sidecar sidecar/whl_explorer.spec

      # Sign only when the cert secret is present. electron-builder's CSC_LINK
      # takes the PFX as base64 directly, so no file is written to disk. Without
      # the secret the installer builds unsigned (auto-discovery off so
      # electron-builder doesn't hunt the runner's cert store). A self-managed
      # PKI cert clears the "unknown publisher" warning only on machines that
      # trust its root CA; public downloaders still see it until a CA-issued
      # cert (e.g. Azure Trusted Signing) fills WIN_CSC_LINK_B64.
      - name: Build the installer
        shell: bash
        env:
          WIN_CSC_LINK_B64: ${{ secrets.WIN_CSC_LINK_B64 }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
        run: |
          if [ -n "$WIN_CSC_LINK_B64" ]; then
            export CSC_LINK="$WIN_CSC_LINK_B64"
            export CSC_KEY_PASSWORD="$WIN_CSC_KEY_PASSWORD"
            echo "Signing the installer with the configured certificate."
          else
            export CSC_IDENTITY_AUTO_DISCOVERY=false
            echo "::warning::No WIN_CSC_LINK_B64 secret: the installer will be unsigned."
          fi
          npx electron-builder --win --publish never

      - name: Read the version
        id: ver
        shell: bash
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      # upload-artifact's if-no-files-found check applies to the path list as a
      # whole. Verify each updater component explicitly so a lone installer
      # cannot make this job look successful while installed clients receive an
      # incomplete update channel.
      - name: Verify the desktop release set
        shell: bash
        run: |
          V=$(node -p "require('./package.json').version")
          for FILE in \
            "release/LibraryTool-Setup-$V.exe" \
            "release/LibraryTool-Setup-$V.exe.blockmap" \
            "release/latest.yml"
          do
            if [ ! -s "$FILE" ]; then
              echo "::error::Missing or empty desktop release artifact: $FILE"
              exit 1
            fi
          done
          if ! grep -Fq "version: $V" release/latest.yml; then
            echo "::error::release/latest.yml does not describe desktop version $V"
            exit 1
          fi
          if ! grep -Fq "LibraryTool-Setup-$V.exe" release/latest.yml; then
            echo "::error::release/latest.yml does not reference the expected installer"
            exit 1
          fi

      # The NSIS exe is the download; latest.yml + the blockmap are the
      # auto-update channel (electron-updater reads them off the GitHub Release).
      # electron-builder writes latest.yml even for a prerelease version (it
      # stays on the default channel), and the GitHub prerelease flag — not the
      # manifest name — is what keeps the stable updater off a prerelease. Name
      # latest.yml exactly, not *.yml: the loose glob also swept up the
      # builder-debug.yml electron-builder drops here. Ship all three or updates
      # silently never happen.
      - name: Keep the installer + update manifest
        uses: actions/upload-artifact@v4
        with:
          name: desktop
          path: |
            desktop/release/LibraryTool-Setup-*.exe
            desktop/release/LibraryTool-Setup-*.exe.blockmap
            desktop/release/latest.yml
          if-no-files-found: error

  # Tag pushes only (a dispatch run is a dry run and stops at the artifacts).
  # Publishes whichever app(s) actually built: the two are versioned and
  # released independently, so a broken Android signing config must not block a
  # good desktop release (or vice versa). Runs when EITHER build succeeded, and
  # each publish step below is guarded on its artifact being present.
  publish:
    if: |
      always() && github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') &&
      needs.preflight.result == 'success' &&
      (needs.desktop.result == 'success' || needs.android.result == 'success')
    needs: [preflight, android, desktop]
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Collect the builds
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      # The android job verifies the signer against the tracked production
      # fingerprint before upload, so anything reaching a tagged publish has the
      # established release identity. Surface which key it was for the record.
      - name: Report the Android signer
        if: needs.android.result == 'success' && needs.android.outputs.signer != ''
        run: |
          echo "- Published Android BookCapture signer: \`${{ needs.android.outputs.signer }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Published Android certificate SHA-256: \`${{ needs.android.outputs.signer_sha256 }}\`" >> "$GITHUB_STEP_SUMMARY"

      - name: GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          APK_V: ${{ needs.android.outputs.version }}
          EXE_V: ${{ needs.desktop.outputs.version }}
        run: |
          # Derive the public title and preamble from the files actually
          # collected. The jobs intentionally release independently, so a
          # one-sided release must never look like both apps shipped.
          desktop_asset=$(find dist -maxdepth 1 -type f -name 'LibraryTool-Setup-*.exe' -print -quit)
          android_asset=$(find dist -maxdepth 1 -type f -name 'BookCapture-*.apk' -print -quit)
          if [ -z "$desktop_asset" ] && [ -z "$android_asset" ]; then
            echo "::error::No releasable desktop or Android artifact was collected."
            exit 1
          fi
          notes=""
          partial_message=""
          if [ -n "$desktop_asset" ] && [ -n "$android_asset" ]; then
            release_title="Library Tool $GITHUB_REF_NAME"
            notes="Desktop $EXE_V · Android BookCapture $APK_V"
          elif [ -n "$desktop_asset" ]; then
            release_title="Library Tool $GITHUB_REF_NAME (desktop only)"
            notes="Desktop $EXE_V"
            partial_message="Only Library Tool Desktop \`$EXE_V\` (\`$(basename "$desktop_asset")\`) is attached. Android Book Capture did not build successfully, so this release contains no Android APK."
          else
            release_title="Android Book Capture $APK_V ($GITHUB_REF_NAME; Android only)"
            notes="Android BookCapture $APK_V"
            partial_message="Only Android Book Capture \`$APK_V\` (\`$(basename "$android_asset")\`) is attached. Library Tool Desktop did not build successfully, so this release contains no Windows installer or updater files."
          fi
          # A prerelease tag (v0.8.0-alpha.1 / -beta / -rc) is flagged prerelease
          # on GitHub. Stable installs remain on the stable channel; installed
          # prereleases follow the prerelease line, and stable installs can opt in.
          pre_args=()
          case "$GITHUB_REF_NAME" in *-alpha*|*-beta*|*-rc*) pre_args=(--prerelease) ;; esac
          notes_file="docs/releases/$GITHUB_REF_NAME.md"
          effective_notes="$RUNNER_TEMP/release-notes.md"
          : > "$effective_notes"
          if [ -n "$partial_message" ]; then
            printf '> [!WARNING]\n> **Partial release:** %s\n\n---\n\n' "$partial_message" >> "$effective_notes"
            echo "## Partial release" >> "$GITHUB_STEP_SUMMARY"
            echo "$partial_message" >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ -f "$notes_file" ]; then
            cat "$notes_file" >> "$effective_notes"
          else
            printf '%s\n' "$notes" >> "$effective_notes"
          fi
          notes_args=(--notes-file "$effective_notes")
          if gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release edit "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" \
              --title "$release_title" "${notes_args[@]}" "${pre_args[@]}"
          else
            gh release create "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --verify-tag \
              "${pre_args[@]}" --title "$release_title" "${notes_args[@]}"
          fi
          gh release upload "$GITHUB_REF_NAME" dist/* --repo "$GITHUB_REPOSITORY" --clobber

      # The step the website actually sees. release_publish.py gets the local
      # file (for sha256/bytes) plus --url, so the row points at the GitHub
      # Release asset rather than the storage bucket.
      - name: Register on the Downloads page
        env:
          SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          if [ -z "$SUPABASE_KEY" ]; then
            echo "::warning::SUPABASE_SERVICE_ROLE_KEY is not set, so the \
          Downloads page was not updated. Add it under Settings > Secrets and \
          re-run this job, or register by hand with tools/release_publish.py."
            echo "- **warning:** release created, but not registered on the Downloads page (no SUPABASE_SERVICE_ROLE_KEY)." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          BASE="https://github.com/$GITHUB_REPOSITORY/releases/download/$GITHUB_REF_NAME"
          # A prerelease tag registers on its own channel so the row lands in the
          # Downloads page's "Other downloads" section instead of replacing the
          # stable card (the table's unique key is platform+version+channel).
          CH=stable
          case "$GITHUB_REF_NAME" in
            *-alpha*) CH=alpha ;;
            *-beta*)  CH=beta ;;
            *-rc*)    CH=rc ;;
          esac
          # register only the app(s) whose artifact is present, so one build's
          # failure never blocks the other from reaching the Downloads page
          EXE=$(ls dist/LibraryTool-Setup-*.exe 2>/dev/null | head -1 || true)
          APK=$(ls dist/BookCapture-*.apk 2>/dev/null | head -1 || true)
          if [ -n "$EXE" ]; then
            python3 tools/release_publish.py "$EXE" --url "$BASE/$(basename "$EXE")" \
              --platform windows --version "${{ needs.desktop.outputs.version }}" --channel "$CH"
          fi
          if [ -n "$APK" ]; then
            python3 tools/release_publish.py "$APK" --url "$BASE/$(basename "$APK")" \
              --platform android --version "${{ needs.android.outputs.version }}" --channel "$CH"
          fi
