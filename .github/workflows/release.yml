name: release

# Build both apps and put them on the website's Downloads page.
#
# Push a tag like v3.1 and this builds the Android APK and the Windows
# installer, attaches them to a GitHub Release named after the tag, and
# registers each in the Supabase `releases` table — which is the Downloads
# page's data source, so the site shows the new builds immediately, no
# redeploy. Each app keeps its own version (gradle versionName, package.json);
# the tag only names the GitHub Release that hosts the files.
#
# workflow_dispatch runs the two builds as a dry run: artifacts to inspect,
# nothing published.
#
# One-time repository setup, all under Settings > Secrets and variables:
#   vars.SUPABASE_URL                  (already set for the pages workflow)
#   secrets.SUPABASE_SERVICE_ROLE_KEY  RLS leaves anon read-only on `releases`,
#                                      so registering rows needs this. Without
#                                      it the GitHub Release still happens and
#                                      the register step says what is missing.
#   secrets.ANDROID_KEYSTORE_B64       optional but recommended: base64 of the
#   secrets.ANDROID_KEYSTORE_PASSWORD  signing keystore. Without them each APK
#   secrets.ANDROID_KEY_ALIAS          is signed with the runner's throwaway
#                                      debug key, and Android refuses to update
#                                      an install whose key changed.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write # create the release and upload its assets

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  android:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
    defaults:
      run:
        working-directory: android/BookCapture
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Signing key (persistent if the secret is set, debug otherwise)
        env:
          KS_B64: ${{ secrets.ANDROID_KEYSTORE_B64 }}
          KS_PASS: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KS_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          if [ -n "$KS_B64" ]; then
            # strip any CR/LF/space first: a secret uploaded from a Windows
            # CRLF .b64 carries a \r that GNU `base64 -d` rejects (invalid input)
            echo "$KS_B64" | tr -d '\r\n ' | base64 -d > "$RUNNER_TEMP/keystore.jks"
            # the password/alias secrets were uploaded the same Windows way, so
            # strip any stray CR too — a trailing \r reads as a wrong password.
            {
              echo "WHL_KEYSTORE_FILE=$RUNNER_TEMP/keystore.jks"
              echo "WHL_KEYSTORE_PASSWORD=$(printf '%s' "$KS_PASS" | tr -d '\r\n')"
              echo "WHL_KEY_ALIAS=$(printf '%s' "${KS_ALIAS:-bookcapture}" | tr -d '\r\n')"
            } >> "$GITHUB_ENV"
          else
            echo "::warning::No ANDROID_KEYSTORE_B64 secret: signing with the \
          runner's debug key, so installing this build over one signed with a \
          different key needs an uninstall first."
          fi

      - name: Build
        run: |
          chmod +x gradlew
          ./gradlew --no-daemon assembleRelease

      - name: Name the APK after its versionName
        id: ver
        run: |
          V=$(sed -n 's/.*versionName = "\([^"]*\)".*/\1/p' app/build.gradle.kts | head -1)
          test -n "$V" || { echo "::error::no versionName in app/build.gradle.kts"; exit 1; }
          mv app/build/outputs/apk/release/app-release.apk "BookCapture-$V.apk"
          echo "version=$V" >> "$GITHUB_OUTPUT"

      - name: Keep the APK
        uses: actions/upload-artifact@v4
        with:
          name: android
          path: android/BookCapture/BookCapture-*.apk
          if-no-files-found: error

  desktop:
    runs-on: windows-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
    defaults:
      run:
        working-directory: desktop
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Python (for the PyInstaller sidecar)
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Sidecar dependencies
        run: python -m pip install -r ../tools/requirements.txt pyinstaller

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Shell dependencies
        run: npm ci

      # The two halves of `npm run dist`, spelled out: that script calls
      # `python3` (the build machine's bare `python` is an unrelated toolchain),
      # while the runner only guarantees `python`.
      - name: Freeze the sidecar
        run: python -m PyInstaller --clean --noconfirm --distpath dist-sidecar --workpath build-sidecar sidecar/whl_explorer.spec

      # Sign only when the cert secret is present. electron-builder's CSC_LINK
      # takes the PFX as base64 directly, so no file is written to disk. Without
      # the secret the installer builds unsigned (auto-discovery off so
      # electron-builder doesn't hunt the runner's cert store). A self-managed
      # PKI cert clears the "unknown publisher" warning only on machines that
      # trust its root CA; public downloaders still see it until a CA-issued
      # cert (e.g. Azure Trusted Signing) fills WIN_CSC_LINK_B64.
      - name: Build the installer
        shell: bash
        env:
          WIN_CSC_LINK_B64: ${{ secrets.WIN_CSC_LINK_B64 }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
        run: |
          if [ -n "$WIN_CSC_LINK_B64" ]; then
            export CSC_LINK="$WIN_CSC_LINK_B64"
            export CSC_KEY_PASSWORD="$WIN_CSC_KEY_PASSWORD"
            echo "Signing the installer with the configured certificate."
          else
            export CSC_IDENTITY_AUTO_DISCOVERY=false
            echo "::warning::No WIN_CSC_LINK_B64 secret: the installer will be unsigned."
          fi
          npx electron-builder --win --publish never

      - name: Read the version
        id: ver
        shell: bash
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      # The NSIS exe is the download; latest.yml + the blockmap are the
      # auto-update channel (electron-updater reads them off the GitHub
      # Release). Ship all three or updates silently never happen.
      - name: Keep the installer + update manifest
        uses: actions/upload-artifact@v4
        with:
          name: desktop
          path: |
            desktop/release/LibraryTool-Setup-*.exe
            desktop/release/LibraryTool-Setup-*.exe.blockmap
            desktop/release/latest.yml
          if-no-files-found: error

  # Tag pushes only (a dispatch run is a dry run and stops at the artifacts).
  # Publishes whichever app(s) actually built: the two are versioned and
  # released independently, so a broken Android signing config must not block a
  # good desktop release (or vice versa). Runs when EITHER build succeeded, and
  # each publish step below is guarded on its artifact being present.
  publish:
    if: |
      always() && startsWith(github.ref, 'refs/tags/') &&
      (needs.desktop.result == 'success' || needs.android.result == 'success')
    needs: [android, desktop]
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Collect the builds
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          APK_V: ${{ needs.android.outputs.version }}
          EXE_V: ${{ needs.desktop.outputs.version }}
        run: |
          # a failed job leaves its version output empty, so name only what shipped
          notes=""
          [ -n "$EXE_V" ] && notes="Desktop $EXE_V"
          [ -n "$APK_V" ] && notes="${notes:+$notes · }Android BookCapture $APK_V"
          gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1 || \
            gh release create "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --verify-tag \
              --title "Library Tool $GITHUB_REF_NAME" --notes "$notes"
          gh release upload "$GITHUB_REF_NAME" dist/* --repo "$GITHUB_REPOSITORY" --clobber

      # The step the website actually sees. release_publish.py gets the local
      # file (for sha256/bytes) plus --url, so the row points at the GitHub
      # Release asset rather than the storage bucket.
      - name: Register on the Downloads page
        env:
          SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          if [ -z "$SUPABASE_KEY" ]; then
            echo "::warning::SUPABASE_SERVICE_ROLE_KEY is not set, so the \
          Downloads page was not updated. Add it under Settings > Secrets and \
          re-run this job, or register by hand with tools/release_publish.py."
            echo "- **warning:** release created, but not registered on the Downloads page (no SUPABASE_SERVICE_ROLE_KEY)." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          BASE="https://github.com/$GITHUB_REPOSITORY/releases/download/$GITHUB_REF_NAME"
          # register only the app(s) whose artifact is present, so one build's
          # failure never blocks the other from reaching the Downloads page
          EXE=$(ls dist/LibraryTool-Setup-*.exe 2>/dev/null | head -1 || true)
          APK=$(ls dist/BookCapture-*.apk 2>/dev/null | head -1 || true)
          if [ -n "$EXE" ]; then
            python3 tools/release_publish.py "$EXE" --url "$BASE/$(basename "$EXE")" \
              --platform windows --version "${{ needs.desktop.outputs.version }}"
          fi
          if [ -n "$APK" ]; then
            python3 tools/release_publish.py "$APK" --url "$BASE/$(basename "$APK")" \
              --platform android --version "${{ needs.android.outputs.version }}"
          fi
