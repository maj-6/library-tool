name: ci

# Lint + tests for the Python tools, on both platforms the app actually
# runs on. Windows is first-class: save_json's os.replace retry semantics
# and the explorer's path handling genuinely differ there.
on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read # checkout, and nothing more

jobs:
  checks:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22.12"

      - name: Install (runtime deps + dev tools, from pyproject.toml)
        run: python -m pip install -e ".[dev]"

      - name: Lint
        run: python -m ruff check .

      - name: Test
        run: python -m pytest -q

      - name: JavaScript checks
        run: |
          node --check desktop/main.js
          node --check desktop/preload.js
          node --check desktop/startup-preload.js
          node --check desktop/updater-preload.js
          node --check tools/whl_explorer/static/app.js
          node --experimental-default-type=module --check website/assets/data.js
          node --experimental-default-type=module --check website/assets/browse.js
          node --experimental-default-type=module --check website/assets/author.js
          node --experimental-default-type=module --check website/assets/releases.js
          node --experimental-default-type=module --check website/assets/release-policy.js
          node --experimental-default-type=module --check website/assets/textsearch.js
          node --experimental-default-type=module --check website/assets/read.js
          node --test

  android:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android/BookCapture
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle
          cache-dependency-path: |
            android/BookCapture/*.gradle.kts
            android/BookCapture/app/build.gradle.kts
            android/BookCapture/gradle/wrapper/gradle-wrapper.properties

      - name: Unit tests, lint, and debug build
        run: ./gradlew --no-daemon testDebugUnitTest lintDebug assembleDebug

  image-processor:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/image_processor
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            services/image_processor/requirements.txt
            services/image_processor/requirements-dev.txt
            services/image_processor/requirements.lock

      - name: Install processor and test tools
        run: |
          python -m pip install -r requirements-dev.txt
          python -m pip install --no-deps page-dewarp==0.3.4
          python -m pip install --no-deps -e .

      - name: Processor tests and lint
        run: |
          python -m pytest
          python -m ruff check whl_image_processor tests

      - name: Build deployable container
        run: docker build -t whl-image-processor:ci .
