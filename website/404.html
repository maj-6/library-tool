<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Not found · Library Tool</title>
<!-- Deliberately self-contained. Pages serves this file for a miss at any depth,
     so `assets/site.css` would resolve against the path that does not exist. -->
<style>
  :root { --paper:#f4f1eb; --ink:#221c14; --ink-soft:#554f40; --accent:#2f6f68; }
  html,body { margin:0; height:100%; }
  body {
    background:var(--paper); color:var(--ink);
    font:16px/1.6 "Roboto Slab",Georgia,"Palatino Linotype",serif;
    display:flex; align-items:center; justify-content:center; text-align:center;
  }
  main { padding:0 20px; }
  h1 { font-size:30px; margin:0 0 6px; letter-spacing:0.4px; font-weight:normal; }
  p { color:var(--ink-soft); margin:0 0 22px; }
  a { color:var(--accent); }
</style>
</head>
<body>
<main>
  <h1>Not found</h1>
  <p>No such page. The shelf is over here:</p>
  <p><a id="home" href="/">Library Tool</a></p>
</main>
<script>
  // Same reason the styles are inline: a relative href on a 404 points into the
  // missing path. A project site lives under /<repo>/, a custom domain at /.
  var seg = location.pathname.split("/")[1];
  var base = location.hostname.endsWith("github.io") && seg ? "/" + seg + "/" : "/";
  document.getElementById("home").href = base;

  // The typeface lives at a fixed path too, so it needs the same base. Without
  // this the page still reads, in whatever slab or serif the reader has.
  var f = document.createElement("style");
  f.textContent =
    '@font-face{font-family:"Roboto Slab";font-style:normal;font-weight:100 900;' +
    'font-display:swap;src:url("' + base + 'assets/fonts/roboto-slab-var.woff2") format("woff2")}';
  document.head.appendChild(f);
</script>
</body>
</html>
