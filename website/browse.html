<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>World Herb Library</title>
<link rel="icon" href="assets/icon.png" />
<link rel="stylesheet" href="assets/library.css" />
</head>
<body>
<header class="lib-masthead">
  <div class="masthead-inner">
    <img class="wm-mark" src="assets/icon.png" alt="" width="40" height="40" />
    <div class="wordmark">
      <a class="wm-title" href="browse.html">World Herb Library</a>
      <div class="wm-sub">An archival collection of botanical &amp; medical works</div>
    </div>
    <a class="wm-parent" href="index.html">part of Library&nbsp;Tool ↩</a>
  </div>
</header>

<div class="lib-shell" id="lib-body">
  <div class="toolbar">
    <form class="toolbar-form" id="controls" role="search">
      <div class="searchfield">
        <input type="search" id="q" name="q" placeholder="Search titles, authors, subjects…"
               autocomplete="off" aria-label="Search the library"
               role="combobox" aria-expanded="false" aria-controls="q-suggest" aria-autocomplete="list" />
        <ul class="suggest" id="q-suggest" role="listbox" hidden></ul>
      </div>
      <div class="sortbox">
        <label class="label" for="sort">Sort</label>
        <select id="sort" name="sort">
          <option value="title">Title</option>
          <option value="year">Year, oldest</option>
          <option value="year-desc">Year, newest</option>
          <option value="recent">Recently added</option>
        </select>
      </div>
    </form>
    <div class="result-count" id="count" aria-live="polite">Loading…</div>
  </div>

  <div class="offline-note" id="offline" hidden>
    Showing a local fixture: no cloud is configured for this copy of the site.
  </div>

  <div class="catalogue">
    <aside class="facets" id="facets" aria-label="Filters">
      <section class="facet">
        <h2>Categories</h2>
        <div class="cat-tree" id="facet-cats"></div>
      </section>
      <section class="facet">
        <h2>Year</h2>
        <div class="yearbox">
          <input type="number" id="from" name="from" placeholder="from" min="1000" max="2100"
                 aria-label="Year from" />
          <span class="dash">–</span>
          <input type="number" id="to" name="to" placeholder="to" min="1000" max="2100"
                 aria-label="Year to" />
        </div>
      </section>
      <section class="facet">
        <h2>Language</h2>
        <div class="lang-list" id="facet-langs"></div>
      </section>
      <button type="button" class="facet-clear" id="clear-facets" hidden>Clear filters</button>
    </aside>

    <main class="records">
      <div class="author-card" id="author-card" hidden></div>
      <div class="active-filters" id="active-filters"></div>
      <ol class="records-list" id="results"></ol>
      <div class="pager" id="pager" hidden>
        <button class="btn" id="prev" type="button">Previous</button>
        <span class="spacer"></span>
        <span class="page-label" id="page"></span>
        <span class="spacer"></span>
        <button class="btn" id="next" type="button">Next</button>
      </div>
    </main>
  </div>
</div>

<script src="assets/config.js" onerror="void 0"></script>
<script type="module" src="assets/browse.js"></script>
</body>
</html>
